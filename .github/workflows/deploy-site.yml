name: Deploy Site

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'standard/**'
      - 'docs/**/*.md'
      - 'docs/*.md'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - name: Check theme drift
        run: |
          if ! diff -q site/src/theme.ts tools/editor/src/theme.ts > /dev/null 2>&1; then
            echo "::warning::site/src/theme.ts has drifted from the canonical source at tools/editor/src/theme.ts"
            diff site/src/theme.ts tools/editor/src/theme.ts || true
          fi
      - run: npm run build
        working-directory: site
      - name: Archive pages artifact
        run: tar --dereference --hard-dereference --directory site/dist -cvf "$RUNNER_TEMP/artifact.tar" --exclude=.git --exclude=.github .
      - uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
