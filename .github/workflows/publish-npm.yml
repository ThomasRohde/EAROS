name: Publish to npm

on:
  push:
    branches: [master]
    paths:
      - 'tools/editor/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: tools/editor/package-lock.json

      - name: Check if version changed
        id: version-check
        working-directory: tools/editor
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PUBLISHED_VERSION → $LOCAL_VERSION"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $LOCAL_VERSION"
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.changed == 'true'
        working-directory: tools/editor
        run: npm ci

      - name: Build
        if: steps.version-check.outputs.changed == 'true'
        working-directory: tools/editor
        run: npm run build

      - name: Publish
        if: steps.version-check.outputs.changed == 'true'
        working-directory: tools/editor
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
