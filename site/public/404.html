<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EaROS</title>
    <script>
      // Single-page app redirect for GitHub Pages
      // See: https://github.com/rafgraph/spa-github-pages
      sessionStorage.redirect = location.href
      location.replace(
        location.pathname.split('/').slice(0, 2).join('/') + '/'
      )
    </script>
  </head>
  <body></body>
</html>
